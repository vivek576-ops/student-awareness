<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTrack — Login</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrapper {
      width: 100%;
      max-width: 480px;
      padding: 20px;
    }
    .brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .brand h1 {
      font-size: 32px;
      color: white;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .brand p {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      margin-top: 6px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }
    .tabs {
      display: flex;
      background: #f0f2f5;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: #888;
      transition: all 0.3s;
    }
    .tab.active {
      background: white;
      color: #302b63;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .form-section { display: none; }
    .form-section.active { display: block; }
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s;
      color: #333;
    }
    input:focus, select:focus {
      border-color: #302b63;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 4px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #302b63, #0f0c29);
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-secondary {
      background: #f0f2f5;
      color: #302b63;
      margin-top: 12px;
    }
    .btn-secondary:hover { background: #e0e2e5; }
    .error-msg {
      background: #ffe0e0;
      color: #c0392b;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 14px;
      display: none;
    }
    .success-msg {
      background: #d4edda;
      color: #155724;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 14px;
      display: none;
    }
    .divider {
      text-align: center;
      color: #aaa;
      font-size: 13px;
      margin: 20px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: #e0e0e0;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .role-info {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .role-badge {
      flex: 1;
      padding: 10px 6px;
      border-radius: 10px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
    }
    .role-badge.principal {
      background: #fff3cd;
      color: #856404;
    }
    .role-badge.teacher {
      background: #d4edda;
      color: #155724;
    }
    .role-badge.student {
      background: #cce5ff;
      color: #004085;
    }
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="brand">
    <h1>🎓 EduTrack</h1>
    <p>Student Performance & Well-being Platform</p>
  </div>

  <div class="card">

    <!-- Role Info Badges -->
    <div class="role-info">
      <div class="role-badge principal">👑 Principal</div>
      <div class="role-badge teacher">👨‍🏫 Teacher</div>
      <div class="role-badge student">👨‍🎓 Student</div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login', this)">
        Sign In
      </button>
      <button class="tab" onclick="switchTab('register', this)">
        New Teacher Register
      </button>
    </div>

    <!-- LOGIN FORM -->
    <div class="form-section active" id="section-login">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="Enter your username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter your password">
      </div>
      <div class="form-group">
        <label>Login As</label>
        <select id="login-role">
          <option value="principal">👑 Principal</option>
          <option value="teacher">👨‍🏫 Teacher</option>
          <option value="student">👨‍🎓 Student</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="handleLogin()">
        Sign In
      </button>
      <div class="error-msg" id="login-error"></div>
    </div>

    <!-- REGISTER FORM (New Teacher Only) -->
    <div class="form-section" id="section-register">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Your full name">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="reg-email" placeholder="Your school email">
      </div>
      <div class="form-group">
        <label>Subject Specialization</label>
        <input type="text" id="reg-specialization"
               placeholder="e.g. Mathematics, Science">
      </div>
      <div class="form-group">
        <label>Choose Username</label>
        <input type="text" id="reg-username" placeholder="Create a username">
      </div>
      <div class="form-group">
        <label>Create Password</label>
        <input type="password" id="reg-password"
               placeholder="Minimum 6 characters">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="reg-confirm"
               placeholder="Repeat your password">
      </div>
      <button class="btn btn-primary" onclick="handleRegister()">
        Submit Registration
      </button>
      <div class="error-msg" id="reg-error"></div>
      <div class="success-msg" id="reg-success"></div>
    </div>

  </div>
</div>

<script>
  const BASE = 'https://student-awareness-backend.onrender.com/api/v1';

  function switchTab(name, btn) {
    document.querySelectorAll('.tab').forEach(
      t => t.classList.remove('active')
    );
    document.querySelectorAll('.form-section').forEach(
      s => s.classList.remove('active')
    );
    btn.classList.add('active');
    document.getElementById('section-' + name)
      .classList.add('active');
  }

  async function handleLogin() {
    const username =
      document.getElementById('login-username').value.trim();
    const password =
      document.getElementById('login-password').value;
    const role =
      document.getElementById('login-role').value;
    const errorEl =
      document.getElementById('login-error');
    errorEl.style.display = 'none';

    if (!username || !password) {
      errorEl.textContent = 'Please fill in all fields';
      errorEl.style.display = 'block';
      return;
    }

    try {
      // Step 1 — Login and get token
      const res = await fetch(`${BASE}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (!res.ok) {
        errorEl.textContent = data.error || 'Login failed';
        errorEl.style.display = 'block';
        return;
      }

      if (data.role !== role) {
        errorEl.textContent =
          `This account is a ${data.role}, not a ${role}`;
        errorEl.style.display = 'block';
        return;
      }

      // Step 2 — Save token
      localStorage.setItem('jwt_token', data.token);
      localStorage.setItem('user_role', data.role);
      localStorage.setItem('user_id', data.user_id);

      // Step 3 — Get full profile info
      const meRes = await fetch(`${BASE}/auth/me`, {
        headers: {
          'Authorization': `Bearer ${data.token}`
        }
      });
      const meData = await meRes.json();

      // Step 4 — Save student_id if student
      if (meData.student_id) {
        localStorage.setItem(
          'student_id', meData.student_id
        );
      }
      if (meData.name) {
        localStorage.setItem('user_name', meData.name);
      }
      if (meData.class_section) {
        localStorage.setItem(
          'class_section', meData.class_section
        );
      }

      // Step 5 — Redirect based on role
      if (data.role === 'principal') {
        window.location.href = 'principal-dashboard.html';
      } else if (data.role === 'teacher') {
        window.location.href = 'teacher-dashboard.html';
      } else {
        window.location.href = 'student-dashboard.html';
      }

    } catch (err) {
      errorEl.textContent =
        'Cannot connect to server. Is Flask running?';
      errorEl.style.display = 'block';
    }
  }

  async function handleRegister() {
    const name =
      document.getElementById('reg-name').value.trim();
    const email =
      document.getElementById('reg-email').value.trim();
    const specialization =
      document.getElementById('reg-specialization')
        .value.trim();
    const username =
      document.getElementById('reg-username').value.trim();
    const password =
      document.getElementById('reg-password').value;
    const confirm =
      document.getElementById('reg-confirm').value;
    const errorEl =
      document.getElementById('reg-error');
    const successEl =
      document.getElementById('reg-success');
    errorEl.style.display = 'none';
    successEl.style.display = 'none';

    if (!name || !email || !username || !password) {
      errorEl.textContent =
        'Please fill in all required fields';
      errorEl.style.display = 'block';
      return;
    }
    if (password.length < 6) {
      errorEl.textContent =
        'Password must be at least 6 characters';
      errorEl.style.display = 'block';
      return;
    }
    if (password !== confirm) {
      errorEl.textContent = 'Passwords do not match';
      errorEl.style.display = 'block';
      return;
    }

    try {
      const res = await fetch(
        `${BASE}/auth/register-teacher`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name, email, specialization,
          username, password
        })
      });
      const data = await res.json();

      if (res.ok) {
        successEl.textContent =
          '✅ Registration submitted! ' +
          'Wait for Principal approval before login.';
        successEl.style.display = 'block';
        document.querySelectorAll('#section-register input')
          .forEach(i => i.value = '');
      } else {
        errorEl.textContent =
          data.error || 'Registration failed';
        errorEl.style.display = 'block';
      }
    } catch (err) {
      errorEl.textContent = 'Cannot connect to server';
      errorEl.style.display = 'block';
    }
  }
</script>
</body>
</html>
